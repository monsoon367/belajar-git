<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<title>Kalkulator Berat Badan Ideal Rill cuyyz</title>
<style>
    body {
        font-family: Arial, sans-serif;
        background: linear-gradient(135deg, #4facfe, #00f2fe);
        display: flex;
        justify-content: center;
        align-items: center;
        height: 100vh;
        margin: 0;
    }

    .container {
        background: white;
        padding: 25px;
        border-radius: 15px;
        width: 320px;
        box-shadow: 0 10px 25px rgba(0,0,0,0.2);
    }

    h2 {
        text-align: center;
        margin-bottom: 20px;
    }

    label {
        font-weight: bold;
        display: block;
        margin-top: 10px;
    }

    input {
        width: 100%;
        padding: 8px;
        margin-top: 5px;
        border-radius: 8px;
        border: 1px solid #ccc;
    }

    button {
        width: 100%;
        padding: 10px;
        margin-top: 20px;
        border: none;
        border-radius: 10px;
        background: #4facfe;
        color: white;
        font-size: 16px;
        cursor: pointer;
    }

    button:hover {
        background: #00c6ff;
    }

    .result {
        margin-top: 20px;
        padding: 10px;
        background: #f1f1f1;
        border-radius: 10px;
        font-size: 14px;
    }
</style>
</head>
<body>

<div class="container">
    <h2>Kalkulator Badan Ideal</h2>

    <label>Berat Badan (kg)</label>
    <input type="number" id="bb" placeholder="Masukkan berat badan">

    <label>Tinggi Badan (cm)</label>
    <input type="number" id="tb" placeholder="Masukkan tinggi badan">

    <label>Umur (tahun)</label>
    <input type="number" id="umur" placeholder="Masukkan umur">

    <button onclick="hitung()">Hitung</button>

    <div class="result" id="hasil">Hasil akan muncul di sini</div>
</div>

<script>
function hitung() {
    let bb = parseFloat(document.getElementById("bb").value);
    let tb = parseFloat(document.getElementById("tb").value);
    let umur = parseInt(document.getElementById("umur").value);

    if (!bb || !tb || !umur) {
        document.getElementById("hasil").innerHTML = "⚠️ Mohon isi semua data.";
        return;
    }

    // BMI
    let tinggiMeter = tb / 100;
    let bmi = bb / (tinggiMeter * tinggiMeter);

    // Kategori BMI
    let kategori = "";
    if (bmi < 18.5) kategori = "Kurus";
    else if (bmi < 25) kategori = "Normal";
    else if (bmi < 30) kategori = "Gemuk";
    else kategori = "Obesitas";

    // Berat badan ideal (Rumus Broca sederhana)
    let bbIdeal = (tb - 100) - ((tb - 100) * 0.1);

    // Penyesuaian ringan berdasarkan umur
    if (umur > 40) {
        bbIdeal += 2;
    }

    document.getElementById("hasil").innerHTML = `
        <b>BMI:</b> ${bmi.toFixed(2)} <br>
        <b>Kategori:</b> ${kategori} <br>
        <b>Perkiraan BB Ideal:</b> ${bbIdeal.toFixed(1)} kg
    `;
}
</script>

</body>
</html>
